<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
-webkit-text-size-adjust:100%;
}

body{
background:#f4f6f9;
overflow-x:hidden;
}

.sidebar{
position:fixed;
width:240px;
height:100vh;
background:#1e293b;
padding-top:20px;
overflow-y:auto;
}

.sidebar h2{
color:white;
text-align:center;
margin-bottom:30px;
padding:0 10px;
font-size:22px;
word-wrap:break-word;
}

.sidebar a{
display:block;
padding:15px 20px;
color:white;
text-decoration:none;
transition:0.3s;
}

.sidebar a:hover{
background:#334155;
}

.main{
margin-left:240px;
padding:20px;
width:calc(100% - 240px);
}

.topbar{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
flex-wrap:wrap;
}

.topbar h2{
font-size:24px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
min-height:130px;
}

.card h3{
color:#6b7280;
font-size:16px;
}

.card h1{
margin-top:10px;
color:#2563eb;
font-size:32px;
word-break:break-word;
}

.quick{
margin-top:30px;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.buttons{
display:flex;
flex-wrap:wrap;
gap:15px;
margin-top:15px;
}

.btn{
background:#2563eb;
padding:12px 20px;
color:white;
text-decoration:none;
border-radius:10px;
text-align:center;
min-width:160px;
transition:0.3s;
}

.btn:hover{
background:#1d4ed8;
}

@media(max-width:768px){

.sidebar{
width:100%;
height:auto;
position:relative;
padding-bottom:10px;
}

.sidebar h2{
font-size:20px;
margin-bottom:15px;
}

.sidebar a{
text-align:center;
padding:12px;
}

.main{
margin-left:0;
width:100%;
padding:15px;
}

.topbar{
flex-direction:column;
align-items:flex-start;
}

.topbar h2{
font-size:22px;
}

.cards{
grid-template-columns:1fr;
}

.card{
padding:20px;
}

.card h1{
font-size:28px;
}

.buttons{
flex-direction:column;
}

.btn{
width:100%;
min-width:unset;
}

}

@media(max-width:480px){

body{
font-size:15px;
}

.main{
padding:10px;
}

.topbar{
padding:12px;
}

.card{
padding:18px;
}

.quick{
padding:15px;
}

.btn{
padding:14px;
font-size:15px;
}

}

</style>

</head>
<link rel="icon" href="{{ url_for('static', filename='images/reen.png') }}">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='images/reen.png') }}">
</head>
<body>

<div class="sidebar">

<h2>Reen Business Centre</h2>

<a href="#">Dashboard</a>
<a href="/view-stock" class="btn">View Stock</a>
<a href="/record-sale" class="btn">Record Sale</a>
<a href="/shops" class="btn">Manage Shops</a>
<a href="/reports" class="btn">Reports</a>
<a href="/users">Users</a>
<a href="/logout">Logout</a>

</div>

<div class="main">

<div class="topbar">
<h2>Dashboard</h2>
<div>Welcome {{ username }}</div>
</div>

<div class="cards">

<div class="card">
    <h3>Items Sold Today</h3>
    <h1>{{ today_items_sold }}</h1>
</div>

<div class="card">
<h3>Today's Sales</h3>
<h1>K{{ today_sales }}</h1>
</div>

<div class="card">
<h3>Users</h3>
<h1>{{ user_count }}</h1>
</div>
</div>

<div class="quick">

<h2>Quick Actions</h2>

<div class="buttons">

<a href="/shops" class="btn">Manage Shops</a>

<a href="/record-sale" class="btn">Record Sale</a>

<a href="/view-stock" class="btn">View Stock</a>

<a href="/reports" class="btn">Reports</a>

</div>

</div>

</div>

</body>
</html>
