<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>View Shop</title>

<style>

*{
    box-sizing:border-box;
}

body{
    font-family:Segoe UI, Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:0;
}

.header{
    background:#1e293b;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

.header h2{
    margin:0;
    font-size:22px;
}

.header a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.container{
    padding:20px;
    max-width:1000px;
    margin:auto;
}

.box{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
    overflow-x:auto;
}

/* SEARCH INPUT FIX */
.search-box{
    margin-bottom:15px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.search-box input{
    flex:1;
    min-width:200px;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

.search-box button{
    background:#2563eb;
    color:white;
    padding:12px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    background:#2563eb;
    color:white;
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    width:100%;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
    min-width:650px;
}

th{
    background:#f1f5f9;
}

th, td{
    padding:10px;
    border-bottom:1px solid #ddd;
    text-align:left;
}

.delete-btn{
    color:red;
    text-decoration:none;
    font-weight:bold;
}

.delete-btn:hover{
    text-decoration:underline;
}

/* MOBILE DEVICES */
@media screen and (max-width:768px){

    .header{
        flex-direction:column;
        align-items:flex-start;
        gap:10px;
    }

    .header h2{
        font-size:18px;
    }

    .container{
        padding:10px;
    }

    .box{
        padding:15px;
    }

    table{
        font-size:14px;
    }

    th, td{
        padding:8px;
    }

    button{
        width:100%;
    }
}

</style>
</head>

<body>

<div class="header">
    <h2>{{ shop[1] }} ({{ shop[2] }})</h2>
    <a href="/shops">Back</a>
</div>

<div class="container">

    <!-- ADD STOCK -->
    <div class="box">

        <h3>Add New Stock</h3>

        <form method="POST" action="/view-shop/{{ shop[0] }}">

            <input type="text"
                   name="stock_name"
                   placeholder="Stock Name"
                   required>

            <input type="number"
                   name="quantity"
                   placeholder="Quantity"
                   required>

            <input type="number"
                   step="0.01"
                   name="selling_price"
                   placeholder="Selling Price"
                   required>

            <button type="submit">
                Save Stock
            </button>

        </form>

    </div>

    <!-- CURRENT STOCK -->
    <div class="box">

        <h3>Current Stock</h3>

        <!-- ✅ SEARCH FEATURE ADDED -->
        <form method="GET" action="/view-shop/{{ shop[0] }}" class="search-box">

            <input type="text"
                   name="search"
                   placeholder="Search stock name..."
                   value="{{ search }}">

            <button type="submit">Search</button>

        </form>

        <table>

            <tr>
                <th>Name</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Total Value</th>
                <th>Action</th>
            </tr>

            {% for s in stocks %}

            <tr>
                <td>{{ s[1] }}</td>
                <td>{{ s[2] }}</td>
                <td>K{{ s[3] }}</td>
                <td>K{{ s[2] * s[3] }}</td>

                <td>
                    <a href="/delete-stock/{{ s[0] }}"
                       class="delete-btn"
                       onclick="return confirm('Delete this stock?')">
                       Delete
                    </a>
                </td>
            </tr>

            {% endfor %}

        </table>

    </div>

</div>

</body>
</html>
