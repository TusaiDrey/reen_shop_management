<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>View Stock</title>

<style>

*{
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
    margin:0;
    background:#f4f6f9;
}

.header{
    background:#1e293b;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

.header a{
    color:white;
    text-decoration:none;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.box{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
}

.btn{
    background:#2563eb;
    color:white;
    padding:10px 15px;
    text-decoration:none;
    border-radius:8px;
}

.btn:hover{
    background:#1d4ed8;
}

</style>

</head>

<body>

<div class="header">
    <h2>View Stock (All Shops)</h2>
    <a href="/dashboard">Back</a>
</div>

<div class="container">

    {% for s in shops %}

    <div class="box">

        <div>
            <h3>{{ s[1] }}</h3>
            <small>{{ s[2] }}</small>
        </div>

        <a class="btn" href="/shop-stock/{{ s[0] }}">
            View Stock
        </a>

    </div>

    {% endfor %}

</div>

</body>
</html>
